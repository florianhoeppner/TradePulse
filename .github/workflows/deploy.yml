name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  deploy-railway:
    needs: test
    runs-on: ubuntu-latest
    if: vars.RAILWAY_PROJECT_ID != ''
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy trading-service
        run: railway up --service trading-service --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Set trading-service env vars
        run: |
          railway variables set \
            --service trading-service \
            PYTHON_VERSION=3.11
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy backend
        run: railway up --service backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Set backend env vars
        run: |
          railway variables set \
            --service backend \
            ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            PAGERDUTY_ROUTING_KEY="${{ secrets.PAGERDUTY_ROUTING_KEY }}" \
            JIRA_DOMAIN="${{ secrets.JIRA_DOMAIN }}" \
            JIRA_EMAIL="${{ secrets.JIRA_EMAIL }}" \
            JIRA_API_TOKEN="${{ secrets.JIRA_API_TOKEN }}" \
            JIRA_PROJECT_KEY="${{ secrets.JIRA_PROJECT_KEY }}" \
            MYGITHUB_TOKEN="${{ secrets.MYGITHUB_TOKEN }}" \
            MYGITHUB_REPO="${{ secrets.MYGITHUB_REPO }}" \
            TRADING_SERVICE_URL="${{ vars.TRADING_SERVICE_INTERNAL_URL }}" \
            PROMETHEUS_URL="http://not-used:9090"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-vercel:
    needs: test
    runs-on: ubuntu-latest
    if: vars.DEPLOY_VERCEL == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Pull Vercel config
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend
        env:
          NEXT_PUBLIC_BACKEND_URL: ${{ vars.BACKEND_PUBLIC_URL }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend
